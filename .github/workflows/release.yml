name: Release
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  RELEASE_APK:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
          cache: 'gradle'

      - name: Run Detekt
        run: ./gradlew detekt --stacktrace

      - name: Decode keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 -d > ${{ github.workspace }}/release.jks

      - name: Build release APK
        run: ./gradlew app:assembleRelease -PmassdroidBuildRoot=${{ github.workspace }}/build-output --stacktrace
        env:
          RELEASE_STORE_FILE: ${{ github.workspace }}/release.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: |
          APK=$(find build-output/app/outputs/apk/release -name "*.apk" | head -1)
          mv "$APK" "build-output/massdroid-${{ steps.version.outputs.version }}.apk"

      - name: Create GitHub Release
        run: |
          gh release create ${{ steps.version.outputs.version }} \
            "build-output/massdroid-${{ steps.version.outputs.version }}.apk" \
            --title "${{ steps.version.outputs.version }}" \
            --notes-file WHATSNEW.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Keep dev-latest in sync with the freshly cut release. A hotfix that
      # lands on main without a subsequent dev push would otherwise leave the
      # debug channel reporting an older versionName than stable. We rebuild
      # the same checkout in debug mode and push it to dev-latest so users
      # tracking the debug release always see a version that is >= the
      # latest tag on main.
      - name: Setup debug keystore for dev-latest build
        run: |
          mkdir -p $HOME/.android
          cp ./.ci/debug.keystore $HOME/.android/debug.keystore

      - name: Build debug APK for dev-latest
        run: ./gradlew app:assembleDebug -PmassdroidBuildRoot=${{ github.workspace }}/build-output --stacktrace

      - name: Refresh dev-latest with matching debug APK
        run: |
          gh release create dev-latest --target dev --title "Dev Build (latest)" --notes "Automatically updated debug APK from the latest dev push." --prerelease 2>/dev/null || true
          gh release upload dev-latest build-output/app/outputs/apk/debug/*.apk --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
